<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Table</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --gold: #C9A96E;
    --gold-light: #E8D5B0;
    --dark: #2C2C2C;
    --text: #4A4A4A;
    --sage: #A8B5A0;
    --sage-light: #D4DDD0;
    --rose: #D4A8A8;
    --rose-light: #F0DEDE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -30%;
    width: 80vw;
    height: 80vw;
    border-radius: 50%;
    background: radial-gradient(circle, var(--sage-light) 0%, transparent 70%);
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40%;
    left: -20%;
    width: 70vw;
    height: 70vw;
    border-radius: 50%;
    background: radial-gradient(circle, var(--rose-light) 0%, transparent 70%);
    opacity: 0.3;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 1s ease 0.2s forwards;
  }
  .ornament .line {
    width: 60px;
    height: 1px;
    background: var(--gold);
  }
  .ornament .diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 1s ease 0.4s forwards;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 52px;
    color: var(--dark);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .ampersand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--gold);
    font-size: 42px;
    display: block;
    margin: -4px 0;
  }

  .date-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text);
    margin-top: 16px;
    opacity: 0.6;
  }

  .search-area {
    width: 100%;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeIn 1s ease 0.6s forwards;
  }

  .search-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.7;
    display: block;
    margin-bottom: 12px;
    text-align: center;
  }

  .search-wrapper {
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 18px 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--dark);
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--gold-light);
    border-radius: 4px;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .search-input::placeholder {
    color: #C0B8AD;
    font-style: italic;
    font-weight: 300;
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
    background: rgba(255,255,255,0.9);
  }

  .search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
  }

  .result {
    width: 100%;
    text-align: center;
    animation: slideUp 0.5s ease forwards;
  }

  .result-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    border: 1px solid var(--gold-light);
    border-radius: 6px;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .result-guest {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 20px;
  }

  .result-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 20px;
  }

  .result-table-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.6;
    margin-bottom: 8px;
  }

  .result-table-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-table-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--sage);
    margin-bottom: 24px;
  }

  .result-companions {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: var(--text);
    opacity: 0.6;
    line-height: 1.8;
  }

  .result-companions strong {
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 10px;
    opacity: 0.8;
  }

  .no-match {
    width: 100%;
    text-align: center;
    padding: 32px;
    animation: slideUp 0.5s ease forwards;
  }

  .no-match-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--text);
    opacity: 0.5;
  }

  .suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--gold-light);
    border-top: none;
    border-radius: 0 0 4px 4px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }

  .suggestions.active { display: block; }

  .suggestion-item {
    padding: 12px 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--dark);
    cursor: pointer;
    transition: background 0.2s ease;
    border-bottom: 1px solid rgba(201, 169, 110, 0.1);
  }

  .suggestion-item:hover,
  .suggestion-item.active {
    background: rgba(201, 169, 110, 0.08);
  }

  .suggestion-item:last-child { border-bottom: none; }

  .suggestion-table {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--gold);
    float: right;
    margin-top: 4px;
  }

  .footer {
    margin-top: auto;
    padding-top: 48px;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s ease 0.8s forwards;
  }

  .footer-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text);
    opacity: 0.35;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .container { padding: 40px 20px 32px; }
    h1 { font-size: 40px; }
    .result-table-number { font-size: 56px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="ornament">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <div class="header">
    <div class="subtitle">Casatorie</div>
    <h1>Filip</h1>
    <span class="ampersand">&</span>
    <h1>Raluca</h1>
    <div class="date-text">26 · 04 · 2026</div>
  </div>

  <div class="search-area">
    <label class="search-label" for="guestSearch">Introdu numele tău</label>
    <div class="search-wrapper">
      <input
        type="text"
        id="guestSearch"
        class="search-input"
        placeholder="ex. Popescu Maria"
        autocomplete="off"
        spellcheck="false"
      >
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div id="resultArea"></div>

  <div class="footer">
    <div class="footer-text">Abia așteptăm să sărbătorim împreună</div>
  </div>
</div>

<script>
// ============================================================
//  GUEST DATA - Filip & Raluca - 240 invitați, 24 mese + Prezidiu
// ============================================================
const TABLES = {
  "Prezidiu": { guests: ["Paliuc Filip", "Paliuc Raluca"] },
  1: { guests: ["Cojocari Bogdan", "Curea Alex", "Curea David", "Curea Ovidiu", "Curea Seli", "Jucsor Luci", "Paliuc Razvan", "Petrutescu Adi", "Petrutescu Ica", "Popovici Luci"] },
  2: { guests: ["Boldea Noemi", "Boldea Relu", "Cojocari Ioana", "Cojocari Liviu", "Curea Amalia", "Curea Lavinia", "Curea Marius", "Halip Flavia", "Halip Silviu", "Jucsor Elian"] },
  3: { guests: ["Amaria Paul", "Garban Dori", "Paliuc Ana", "Paliuc Angela", "Paliuc Cristi", "Paliuc Liviu", "Paliuc Mimo", "Paliuc Alex", "Pitut Moni", "Trufin Valeriu"] },
  4: { guests: ["Bodnarescu Denisa", "Bodnarescu Ligi", "Cojocariu Daiana", "Cojocariu Daniel", "Lupastean Emi", "Lupastean Iuli", "Lupastean Maria", "Lupastean Nicu", "Lupastean Rodica", "Puiu Larisa"] },
  5: { guests: ["Cazacu Costi", "Cazacu Lidia", "Cozarov Carmen", "Cozarov Raul", "Curea Daiana", "Curea Dani", "Curea Daniela", "Curea Dinu", "Curea Radu"] },
  6: { guests: ["Amaria Mitica", "Amaria Rodica", "Bodnarescu Marcel", "Bodnarescu Nana", "Circa Rave", "Circa Tibi", "Paliuc Iuliana", "Paliuc Nicu", "Paliuc Radu", "Trufin Stela"] },
  7: { guests: ["Brstiak Cristina", "Brstiak Yoko", "Buzduga Ancuta", "Buzduga Dan", "Cifor Cristina", "Cifor Tinu", "Garban Dani", "Garban Geno", "Mazilu Laura"] },
  8: { guests: ["Herlinschi Ame", "Herlinschi Ana", "Herlinschi Fabi", "Herlinschi Lidia", "Herlinschi Sever", "Herlinschi Vasile", "Paliuc Carmina", "Paliuc Catalin", "Paliuc Corneliu", "Paliuc Penina"] },
  9: { guests: ["Curea Ana", "Curea Elena", "Curea Florin", "Curea Marcel", "Curea Sami", "Curea Vergi", "Ichim Dumitru", "Ichim Mita", "Paliuc Dina", "Paliuc Vilu"] },
  10: { guests: ["Craciun Alex", "Craciun Daria", "Cristea Lavi", "Curea Andrei", "Curea Beniamim", "Curea Ramona", "Menli Hally", "Paliuc Claudia", "Paliuc Dumitru", "Paliuc Flavius", "Paliuc Lari"] },
  11: { guests: ["Cocian Paul", "Kurunczi Andreea", "Moldovan Amina", "Parvany Ale", "Parvany Levi", "Rusu Emanuel", "Rusu Natalia", "Stoian Vanessa", "Weisz Markus", "Zifceak Andreea"] },
  12: { guests: ["Bodnarescu Beni", "Bodnarescu Naomi", "Circa Mali", "Ferecean Dorian", "Fulop Flavius", "Fulop Jessi", "Herlinschi Marcus", "Lupulescu Denis", "Mihoc Nicu", "Neda Victor"] },
  13: { guests: ["Bodnarescu Dani", "Circa Sabin", "Cojocariu David", "Curea Dani", "Garban Seba", "Orga Bogdi", "Orga Raducu", "Pantalici Luca", "Pantea Daniel", "Pantea Irina"] },
  14: { guests: ["Cantare1", "Cantare2", "Cantare3", "Fotograf1", "Fotograf2", "Inghetata1", "Inghetata2", "Photobooth", "Video1", "Video2"] },
  15: { guests: ["Carapanceanu Ramona", "Cioanca Alesia", "Cioanca Flavius", "Cioanca Lavi", "Iochim Alex", "Iochim Rebi", "Marc Dana", "Marc Ildi", "Marc Marius", "Marc Tibi", "Stoia Tibi"] },
  16: { guests: ["Bundurus Crina", "Bundurus Gabriel", "Felvinczi Denis", "Oleniuc Ilie", "Oleniuc Naomi", "Palic Sara", "Trofin Oli", "Trofin Raluca"] },
  17: { guests: ["Farcas Cosmin", "Farcas Silvi", "Paliuc Octa", "Paliuc Vera", "Pantalici Beja", "Pantalici Marius", "Piscuc Lidi", "Piscuc Liviu", "Piscuc Tudorita"] },
  18: { guests: ["Dobrei Corina", "Dobrei David", "Dobrei Radu", "Farcas Alex", "Farcas Bogdi", "Farcas Denisa", "Farcas Doina", "Farcas Ionela", "Todorut Maria"] },
  19: { guests: ["Banceu Flavius", "Cifor Melissa", "Cojocari Laura", "Cojocari Alesia", "Cojocariu Oana", "Curea Denis", "Halip Aisha", "Paliuc Bianca", "Puiu Damian", "Toth Daria"] },
  20: { guests: ["Karabenciov Clau", "Karabenciov Marian", "Paliuc Iasi", "Paliuc Mircea", "Paliuc Rebe", "Paliuc Sergiu", "Paliuc Tabita", "Paliuc Tibi", "Pantalici Razvan", "Zarcula Ade", "Zarcula Edi"] },
  21: { guests: ["Cifor Rut", "Curea Ana", "Curea Ema", "Curea Lea", "Curea Rebeca", "Halip Antonia", "Marc Sara", "Marc Sonia", "Paliuc Alma", "Paliuc Tabita"] },
  22: { guests: ["Brstiak Mati", "Cifor Timo", "Curea David", "Curea Emi", "Curea Marc", "Farcas Mati", "Halip Alvin", "Halip Aser", "Marc David", "Paliuc Alen", "Paliuc Cosmin"] },
  23: { guests: ["Cojocariu Estera", "Fazacas Mari", "Hopitea Iasmina", "Ibinceanu Cosmina", "Ionesi Alesia", "Neacsu Naomi", "Pantalici Rut", "Sandul Loredana", "Ursachi Bea", "Ursachi Maria"] },
  24: { guests: ["Antalag Rahela", "Antalag Dani", "Fazacas Adina", "Halip Jessi", "Kurunczi Diana", "Lacatus Cristi", "Lacatus Meli", "Magdici Cornelia", "Magdici Danut", "Maidaniuc Alex"] },
};

// Build a flat lookup: name -> table key
// Handle duplicate names by storing as "Name (Masa X)"
const guestLookup = {};
const nameCounts = {};

// First pass: count occurrences
for (const [tableKey, tableData] of Object.entries(TABLES)) {
  for (const guest of tableData.guests) {
    const lower = guest.toLowerCase();
    nameCounts[lower] = (nameCounts[lower] || 0) + 1;
  }
}

// Second pass: build lookup with disambiguation
const allGuests = [];
for (const [tableKey, tableData] of Object.entries(TABLES)) {
  for (const guest of tableData.guests) {
    const lower = guest.toLowerCase();
    if (nameCounts[lower] > 1) {
      // Duplicate name - add table info for disambiguation
      const displayName = `${guest} (Masa ${tableKey})`;
      guestLookup[displayName.toLowerCase()] = tableKey;
      allGuests.push(displayName);
    } else {
      guestLookup[lower] = tableKey;
      allGuests.push(guest);
    }
  }
}
allGuests.sort();

// DOM
const input = document.getElementById('guestSearch');
const suggestionsEl = document.getElementById('suggestions');
const resultArea = document.getElementById('resultArea');

let activeSuggestion = -1;

input.addEventListener('input', () => {
  const val = input.value.trim().toLowerCase();
  resultArea.innerHTML = '';

  if (val.length < 2) {
    suggestionsEl.classList.remove('active');
    return;
  }

  const matches = allGuests.filter(g => g.toLowerCase().includes(val));

  if (matches.length === 0) {
    suggestionsEl.classList.remove('active');
    resultArea.innerHTML = `
      <div class="no-match">
        <div class="no-match-text">Nu am găsit acest nume.<br>Verifică scrierea și încearcă din nou.</div>
      </div>`;
    return;
  }

  if (matches.length === 1 && matches[0].toLowerCase() === val) {
    suggestionsEl.classList.remove('active');
    showResult(matches[0]);
    return;
  }

  activeSuggestion = -1;
  suggestionsEl.innerHTML = matches.slice(0, 8).map((g, i) => {
    const tableKey = guestLookup[g.toLowerCase()];
    const tableLabel = tableKey === 'Prezidiu' ? 'Prezidiu' : `Masa ${tableKey}`;
    return `<div class="suggestion-item" data-index="${i}" data-name="${g}">
      ${highlightMatch(g, val)}
      <span class="suggestion-table">${tableLabel}</span>
    </div>`;
  }).join('');
  suggestionsEl.classList.add('active');

  suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
    item.addEventListener('click', () => {
      const name = item.dataset.name;
      input.value = name.replace(/ \(Masa .+\)$/, '');
      suggestionsEl.classList.remove('active');
      showResult(name);
    });
  });
});

input.addEventListener('keydown', (e) => {
  const items = suggestionsEl.querySelectorAll('.suggestion-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1);
    updateActive(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeSuggestion = Math.max(activeSuggestion - 1, 0);
    updateActive(items);
  } else if (e.key === 'Enter' && activeSuggestion >= 0) {
    e.preventDefault();
    items[activeSuggestion].click();
  }
});

function updateActive(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === activeSuggestion));
}

function highlightMatch(name, query) {
  const idx = name.toLowerCase().indexOf(query);
  if (idx < 0) return name;
  return name.slice(0, idx) + '<strong>' + name.slice(idx, idx + query.length) + '</strong>' + name.slice(idx + query.length);
}

function showResult(displayName) {
  const tableKey = guestLookup[displayName.toLowerCase()];
  if (!tableKey) return;

  const table = TABLES[tableKey];
  const baseName = displayName.replace(/ \(Masa .+\)$/, '');
  const companions = table.guests.filter(g => g !== baseName || (table.guests.filter(x => x === baseName).length > 1));
  // Better: show all others at the table
  const others = [];
  const used = new Set();
  for (const g of table.guests) {
    if (g === baseName && !used.has('self')) {
      used.add('self');
      continue; // skip self once
    }
    others.push(g);
  }

  const tableLabel = tableKey === 'Prezidiu' ? 'Prezidiu' : tableKey;
  const isPresidium = tableKey === 'Prezidiu';

  resultArea.innerHTML = `
    <div class="result">
      <div class="result-card">
        <div class="result-guest">${baseName}</div>
        <div class="result-divider"></div>
        <div class="result-table-label">Masa Ta</div>
        <div class="result-table-number">${isPresidium ? '♥' : tableLabel}</div>
        ${isPresidium ? '<div class="result-table-name">Prezidiu</div>' : ''}
        ${others.length > 0 ? `<div class="result-companions">
          <strong>Împreună cu</strong>
          ${others.join(' · ')}
        </div>` : ''}
      </div>
    </div>`;
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrapper')) {
    suggestionsEl.classList.remove('active');
  }
});

input.focus();
</script>
</body>
</html>
